name: Refresh data and deploy

on:
  schedule:
    - cron: "0 22 * * 1-5"   # weekdays 22:00 UTC (after US market close)
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch market data
        run: python fetch_market_data.py

      - name: Fetch cycle data
        run: python fetch_cycle_data.py

      - name: Fetch neocloud deals
        run: python fetch_deals.py

      - name: Fetch case study data (one-time -- historical, only if missing)
        run: |
          if [ ! -f casestudies.json ]; then
            python fetch_casestudies.py
          fi

      - name: Fetch TW monthly revenue (first run, then days 1-15)
        run: |
          if [ ! -f monthlies.json ] || [ "$(date +%-d)" -le 15 ]; then
            python fetch_tw_monthlies.py || echo "MOPS fetch failed; keeping previous monthlies.json"
          fi

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in market.json cycle.json deals.json casestudies.json factset.json monthlies.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --cached --quiet || git commit -m "chore: daily data refresh [skip ci]"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
