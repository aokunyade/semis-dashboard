<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<title>Semis Cockpit</title>
<style>
  :root{
    --bg:#0b0e14; --panel:#0e131c; --row:#0d1320; --row2:#101725; --line:#1c2433;
    --txt:#c9d4e3; --dim:#7d8aa0; --head:#5b6b85; --accent:#58a6ff;
    --green:#3fb950; --red:#f85149; --amber:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  a{color:var(--accent);text-decoration:none}
  header{padding:14px 18px 6px}
  h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
  .sub{color:var(--dim);font-size:12px;margin-top:3px}
  .sub b{color:var(--txt)}
  .controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 18px;position:sticky;top:0;background:var(--bg);z-index:5;border-bottom:1px solid var(--line)}
  input[type=text]{background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--txt);padding:6px 10px;width:230px;font-size:13px}
  input::placeholder{color:var(--head)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--dim);border:0;padding:6px 12px;cursor:pointer;font-size:12px}
  .seg button.on{background:#17324f;color:#cfe6ff}
  .seg button+button{border-left:1px solid var(--line)}
  .legend{margin-left:auto;color:var(--head);font-size:11px}
  .wrap{padding:0 10px 60px}
  table{border-collapse:collapse;width:100%;font-variant-numeric:tabular-nums}
  thead th{position:sticky;top:53px;background:var(--bg);color:var(--head);font-weight:600;
    font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:7px 8px;text-align:right;
    border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap}
  thead th.l{text-align:left}
  thead th .grp{color:var(--accent);font-size:10px}
  th.sortcol{color:var(--txt)}
  tbody td{padding:5px 8px;text-align:right;border-bottom:1px solid #131a27;white-space:nowrap}
  tbody td.l{text-align:left}
  tbody tr:hover td{background:#0f1726}
  .tk{font-weight:700;color:#e6edf6}
  .nm{color:var(--dim);max-width:190px;overflow:hidden;text-overflow:ellipsis}
  .sec{color:var(--head);font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .note{max-width:250px;white-space:normal!important;font-size:11px;line-height:1.35}
  .heatstrip{display:inline-flex;gap:2px;vertical-align:middle}
  .hcell{width:15px;height:14px;border-radius:2px;display:inline-block}
  .note a{color:var(--dim);border-bottom:1px dotted #33415c}
  .note a:hover{color:var(--accent);border-bottom-color:var(--accent)}
  .fx{display:inline-block;margin-left:5px;font-size:9px;color:var(--amber);border:1px solid #3a3015;background:#1d1808;border-radius:3px;padding:0 4px;vertical-align:middle}
  .grouphdr td{background:#0a0f18;color:var(--accent);font-weight:700;font-size:12px;text-transform:uppercase;text-align:left;
    letter-spacing:.5px;padding:8px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);cursor:pointer}
  .grouphdr .cnt{color:var(--head);font-weight:600}
  .pos{color:var(--green)} .neg{color:var(--red)} .na{color:#3c4658}
  .last{color:#e6edf6}
  .val{color:var(--dim)}
  /* heatmap */
  .hm{padding:6px 18px 40px}
  .hm h2{font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .hmgroup{margin-bottom:14px}
  .hmlabel{color:var(--head);font-size:11px;text-transform:uppercase;letter-spacing:.4px;margin:8px 0 5px}
  .tiles{display:flex;flex-wrap:wrap;gap:4px}
  .tile{width:78px;height:50px;border-radius:5px;display:flex;flex-direction:column;justify-content:center;align-items:center;
    color:#fff;font-size:11px;border:1px solid rgba(255,255,255,.06)}
  .tile b{font-size:12px;font-weight:700}
  .tile .p{font-size:11px;opacity:.95}
  .tile.dim{opacity:.32}
  .foot{color:var(--head);font-size:11px;padding:14px 18px}
  .hidden{display:none}
  /* cycle tab */
  .cy{padding:12px 18px 40px}
  .cycard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .cygrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:12px}
  .cylabel{color:var(--head);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
  .cyval{color:#e6edf6;font-size:19px;font-weight:700;margin:2px 0}
  .cyval small{font-size:11px;font-weight:600;margin-left:6px}
  .cysrc{color:var(--head);font-size:10px;margin-top:2px}
  .cyphase{font-size:14px;font-weight:700}
  .cybar{display:flex;height:8px;border-radius:4px;overflow:hidden;margin:8px 0 4px;position:relative}
  .cybar div{flex:1}
  .cymark{position:absolute;top:-4px;width:2px;height:16px;background:#fff;border-radius:1px}
  .cyaxis{display:flex;justify-content:space-between;color:var(--head);font-size:10px}
  .cysig{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip{font-size:10px;border:1px solid var(--line);border-radius:4px;padding:2px 7px;color:var(--dim)}
  .chip.hot{color:#ffb38a;border-color:#4a2d18;background:#1d1206}
  .chip.cold{color:#8ad1ff;border-color:#17415f;background:#081826}
  .hl{margin:3px 0;font-size:12px;color:var(--txt)}
  .hl .tag{font-size:9px;border-radius:3px;padding:1px 5px;margin-right:6px;vertical-align:middle}
  .hl .tag.bubble{background:#2d1416;color:#ff9a93;border:1px solid #58262b}
  .hl .tag.demand{background:#0f2417;color:#7ee2a0;border:1px solid #1f4a2e}
  /* factset tab */
  .fs{padding:12px 18px 40px}
  .fsbar{display:inline-block;height:9px;border-radius:2px;background:var(--accent);vertical-align:middle;margin-right:6px}
  .fsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px;margin-top:10px}
  .fscard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .fscard h3{margin:0 0 6px;font-size:13px;color:#e6edf6}
  .fslabel{color:var(--head);font-size:10px;text-transform:uppercase;letter-spacing:.4px;margin:7px 0 3px}
  .fschips{display:flex;flex-wrap:wrap;gap:4px}
  .fschips span{font-size:10px;border:1px solid var(--line);border-radius:4px;padding:1px 6px;color:var(--dim);background:var(--row)}
  .cert{font-size:9px;border-radius:3px;padding:0 4px;margin-left:5px;border:1px solid var(--line);color:var(--dim)}
  /* case studies tab */
  .cs{padding:12px 18px 60px}
  .cs h2{font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:22px 0 4px;border-bottom:1px solid var(--line);padding-bottom:5px}
  .cs .sub2{color:var(--head);font-size:11px;margin:0 0 10px}
  .csgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:10px}
  .cscard{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
  .cscard.nar{border-style:dashed;opacity:.85}
  .cscard h3{margin:0;font-size:13px;color:#e6edf6;display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .cscard h3 .r{font-size:12px;font-weight:700;white-space:nowrap}
  .csmeta{color:var(--head);font-size:10px;margin:2px 0 4px}
  .csnote{color:var(--dim);font-size:11px;margin-top:5px;line-height:1.45}
  .cssubb{color:var(--txt);font-size:11px;margin-top:6px;line-height:1.5;border-left:2px solid #2a3a55;padding:2px 0 2px 8px;background:#0c1220;border-radius:0 4px 4px 0}
  .csb{margin-top:8px}
  .csb div{font-size:11.5px;color:var(--txt);margin:5px 0;padding-left:14px;position:relative;line-height:1.5}
  .csb div:before{content:"▸";position:absolute;left:0;color:var(--accent)}
  .logchip{font-size:9px;border:1px solid #2a3a55;background:#0d1b2e;color:#7fb3ff;border-radius:3px;padding:0 4px;margin-left:6px;vertical-align:middle}
  .delchip{font-size:9px;border:1px solid #4a2d18;background:#1d1206;color:#ffb38a;border-radius:3px;padding:0 4px;margin-left:6px;vertical-align:middle}
  .wl{color:var(--head);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;font-weight:700}
  .wl.win{color:var(--green)} .wl.lose{color:var(--red)}
  /* ---- mobile / iPhone ---- */
  html{-webkit-text-size-adjust:100%}
  .scrollx{overflow-x:auto;-webkit-overflow-scrolling:touch}
  @media (max-width:700px){
    header{padding:10px 12px 4px}
    h1{font-size:16px}
    .controls{padding:8px 10px;gap:6px;position:static}
    .controls .seg{overflow-x:auto;max-width:100%}
    .seg button{padding:6px 9px;white-space:nowrap}
    input[type=text]{width:100%;font-size:16px}  /* 16px stops iOS zoom-on-focus */
    .legend{display:none}
    .wrap{padding:0 4px 60px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    #tableWrap table{min-width:1060px}
    thead th{position:static}
    .grouphdr td{position:static}
    .hm{padding:6px 10px 40px}
    .tile{width:62px;height:44px;font-size:10px}
    .tile b{font-size:11px}
    .cy,.fs,.cs{padding:10px 10px 50px}
    .cygrid{grid-template-columns:1fr}
    .csgrid{grid-template-columns:1fr}
    .fsgrid{grid-template-columns:1fr}
    .fs table{min-width:640px}
    .csb div{font-size:12px}
    .csnote{font-size:11.5px}
  }
</style>
</head>
<body>
<header>
  <h1>Semis Cockpit</h1>
  <div class="sub" id="sub">loading…</div>
</header>

<div class="controls">
  <input type="text" id="filter" placeholder="Filter ticker or company…">
  <span class="seg" id="view">
    <button data-v="table" class="on">Table</button>
    <button data-v="heat">Heatmap</button>
    <button data-v="cycle">Cycle</button>
    <button data-v="fs">FactSet</button>
    <button data-v="tw">TW Monthly</button>
    <button data-v="cases">Case Studies</button>
  </span>
  <span class="seg" id="groupby">
    <button data-g="sector" class="on">By sector</button>
    <button data-g="theme">By theme</button>
  </span>
  <span class="legend" id="legend">▲ up&nbsp;&nbsp;▼ down&nbsp;&nbsp;<span class="fx">FX</span> foreign-listed (local currency)</span>
</div>

<div class="wrap" id="tableWrap">
  <table>
    <thead>
      <tr id="head"></tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>

<div class="hm hidden" id="heatWrap"></div>
<div class="cy hidden" id="cycleWrap"></div>
<div class="fs hidden" id="fsWrap"></div>
<div class="fs hidden" id="twWrap"></div>
<div class="cs hidden" id="casesWrap"></div>

<div class="foot" id="foot"></div>

<script>
const COLS = [
  {k:"last",  label:"Last",  grp:""},
  {k:"ret1d", label:"1D",    grp:"PERFORMANCE"},
  {k:"ret1w", label:"1W",    grp:""},
  {k:"ret1m", label:"1M",    grp:""},
  {k:"retYtd",label:"YTD",   grp:""},
  {k:"ret1y", label:"1Y",    grp:""},
  {k:"ret5y", label:"5Y",    grp:""},
  {k:"val",   label:"Val",   grp:"VALUATION"},
];
let CFG=null, MKT=null, CYC=null, FS=null, CS=null, NOTES=null, TW=null, state={view:"table", group:"sector", sort:"ret1d", dir:-1, filter:""};
const collapsed = new Set();

async function load(){
  try{
    const [c,m,cy,fs,cs,nt,tw] = await Promise.all([
      fetch("sectors.json").then(r=>r.json()),
      fetch("market.json").then(r=>r.json()).catch(()=>({stocks:{}})),
      fetch("cycle.json").then(r=>r.json()).catch(()=>null),
      fetch("factset.json").then(r=>r.json()).catch(()=>null),
      fetch("casestudies.json").then(r=>r.json()).catch(()=>null),
      fetch("notes.json").then(r=>r.json()).catch(()=>null),
      fetch("monthlies.json").then(r=>r.json()).catch(()=>null)
    ]);
    CFG=c; MKT=m; CYC=cy; FS=fs; CS=cs; NOTES=nt; TW=tw;
    const n = countTickers();
    const upd = m.updated ? new Date(m.updated).toLocaleString() : "no data yet";
    document.getElementById("sub").innerHTML =
      `<b>${n}</b> names across <b>${c.sectors.length}</b> sub-sectors &nbsp;·&nbsp; updated <b>${upd}</b>`;
    render();
  }catch(e){
    document.getElementById("sub").textContent = "Error loading data: "+e;
  }
}
function countTickers(){let s=new Set();CFG.sectors.forEach(x=>x.tickers.forEach(t=>s.add(t.t)));return s.size;}
function secOf(t){
  if(!secOf.map){secOf.map={};CFG.sectors.forEach(s=>s.tickers.forEach(x=>{if(!(x.t in secOf.map))secOf.map[x.t]=s.name;}));}
  return secOf.map[t]||"";
}

// ---- grouping ----
function groups(){
  if(state.group==="theme"){
    const byId={}; Object.entries(CFG.themes).forEach(([id,name])=>byId[id]={name,tickers:[]});
    CFG.sectors.forEach(s=>s.tickers.forEach(t=>(t.themes||[]).forEach(th=>{if(byId[th])byId[th].tickers.push(t);})));
    return Object.values(byId);
  }
  return CFG.sectors.map(s=>({name:s.name,tickers:s.tickers}));
}
function rowsFor(tickers){
  const f=state.filter.toLowerCase();
  let rows=tickers.map(t=>({...t, d:(MKT.stocks||{})[t.t]||{}}))
    .filter(r=> !f || r.t.toLowerCase().includes(f) || (r.n||"").toLowerCase().includes(f) || secOf(r.t).toLowerCase().includes(f));
  const k=state.sort;
  rows.sort((a,b)=>{
    let va=a.d[k], vb=b.d[k];
    if(va==null&&vb==null)return 0; if(va==null)return 1; if(vb==null)return -1;
    return (va-vb)*state.dir;
  });
  return rows;
}

// ---- formatting ----
function fmtPct(v){
  if(v==null) return '<span class="na">—</span>';
  const cls=v>0?"pos":(v<0?"neg":"");
  const ar=v>0?"▲":(v<0?"▼":"");
  return `<span class="${cls}">${v>0?"+":""}${v.toFixed(1)}%${ar?" "+ar:""}</span>`;
}
function fmtLast(d){
  if(d.last==null) return '<span class="na">—</span>';
  return `<span class="last">${d.last.toLocaleString(undefined,{maximumFractionDigits:2})}</span>`;
}
function fmtVal(d){ return d.val==null?'<span class="na">—</span>':`<span class="val">${d.val} ${d.valLabel||""}</span>`; }
function fmtNote(t){
  const n=NOTES&&NOTES.stocks&&NOTES.stocks[t];
  if(!n) return '<span class="na">—</span>';
  return n.url?`<a href="${n.url}" target="_blank" rel="noopener" title="Open source article">${n.note} ↗</a>`:n.note;
}

// ---- table render ----
function renderHead(){
  const h=document.getElementById("head");
  let html=`<th class="l">Ticker</th><th class="l">Company</th><th class="l">Sub-sector</th>`;
  const noteHdr=`<th class="l" style="cursor:default">1M Note${NOTES&&NOTES.updated?`<br><span style="font-weight:400;text-transform:none;letter-spacing:0">as of ${NOTES.updated}</span>`:""}</th>`;
  COLS.forEach(c=>{
    const on=state.sort===c.k?"sortcol":"";
    const arrow=state.sort===c.k?(state.dir<0?" ▼":" ▲"):"";
    html+=`<th class="${on}" data-k="${c.k}">${c.grp?`<span class="grp">${c.grp}</span><br>`:""}${c.label}${arrow}</th>`;
  });
  html+=noteHdr;
  h.innerHTML=html;
  h.querySelectorAll("th[data-k]").forEach(th=>th.onclick=()=>{
    const k=th.dataset.k;
    if(state.sort===k)state.dir*=-1; else {state.sort=k;state.dir=-1;}
    render();
  });
}
function renderTable(){
  renderHead();
  const body=document.getElementById("body");
  let html="";
  groups().forEach(g=>{
    const rows=rowsFor(g.tickers);
    if(!rows.length) return;
    const isC=collapsed.has(g.name);
    html+=`<tr class="grouphdr" data-g="${g.name}"><td colspan="${COLS.length+4}">${isC?"▶":"▼"} ${g.name} <span class="cnt">(${rows.length})</span></td></tr>`;
    if(isC) return;
    rows.forEach(r=>{
      html+=`<tr><td class="l"><span class="tk">${r.t.split(".")[0]}</span>${r.fx?`<span class="fx" title="${r.fx} · ${r.d.cur||""}">FX</span>`:""}</td>`+
            `<td class="l nm">${r.n||""}</td>`+
            `<td class="l sec" title="${secOf(r.t)}">${secOf(r.t)}</td>`+
            `<td>${fmtLast(r.d)}</td>`+
            COLS.slice(1,7).map(c=>`<td>${fmtPct(r.d[c.k])}</td>`).join("")+
            `<td>${fmtVal(r.d)}</td>`+
            `<td class="l note">${fmtNote(r.t)}</td></tr>`;
    });
  });
  body.innerHTML=html||`<tr><td colspan="${COLS.length+4}" style="padding:20px;color:var(--head)">No matches.</td></tr>`;
  body.querySelectorAll(".grouphdr").forEach(tr=>tr.onclick=()=>{
    const g=tr.dataset.g; collapsed.has(g)?collapsed.delete(g):collapsed.add(g); render();
  });
}

// ---- heatmap render ----
function heatColor(v,cap){
  if(v==null) return "#161c28";
  const x=Math.max(-1,Math.min(1,v/cap));
  if(x>=0){const a=0.15+0.6*x;return `rgba(46,160,67,${a.toFixed(3)})`;}
  const a=0.15+0.6*(-x);return `rgba(248,81,73,${a.toFixed(3)})`;
}
function heatSection(title,key,cap){
  let html=`<h2>${title}</h2>`;
  groups().forEach(g=>{
    const rows=rowsFor(g.tickers);
    if(!rows.length) return;
    html+=`<div class="hmgroup"><div class="hmlabel">${g.name}</div><div class="tiles">`;
    rows.forEach(r=>{
      const v=r.d[key];
      html+=`<div class="tile ${v==null?"dim":""}" style="background:${heatColor(v,cap)}" title="${r.n||""}">`+
            `<b>${r.t.split(".")[0]}</b><span class="p">${v==null?"—":(v>0?"+":"")+v.toFixed(1)+"%"}</span></div>`;
    });
    html+=`</div></div>`;
  });
  return html;
}
function renderHeat(){
  document.getElementById("heatWrap").innerHTML =
    heatSection("% Daily","ret1d",6) + heatSection("% YTD","retYtd",60);
}

// ---- cycle render ----
function spark(series, color){
  if(!series || series.length<2) return "";
  const vals=series.map(s=>s[1]).filter(v=>v!=null);
  const min=Math.min(...vals), max=Math.max(...vals), rng=(max-min)||1;
  const pts=series.filter(s=>s[1]!=null).map((s,i,arr)=>
    `${(i/(arr.length-1)*160).toFixed(1)},${(30-(s[1]-min)/rng*26+2).toFixed(1)}`).join(" ");
  return `<svg viewBox="0 0 160 34" width="100%" height="34" preserveAspectRatio="none">`+
         `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5"/></svg>`;
}
function trendColor(v, invert){
  if(v==null) return "var(--dim)";
  const good = invert ? v<0 : v>0;
  return good ? "var(--green)" : "var(--red)";
}
function cyCard(label, valueHtml, series, color, src){
  return `<div class="cycard"><div class="cylabel">${label}</div>`+
         `<div class="cyval">${valueHtml}</div>${series?spark(series,color):""}`+
         `<div class="cysrc">${src}</div></div>`;
}
const SIG_LABELS={soxSpx:"SOX/SPX",soxPe:"Valuation",invDays:"Inventory",analogYoY:"Analog",
                  memRel3m:"Memory",capexYoY:"Capex",fredIp:"Production",sentiment:"Headlines"};
function renderCycle(){
  const w=document.getElementById("cycleWrap");
  if(!CYC){w.innerHTML=`<div class="cycard">No cycle.json yet — run fetch_cycle_data.py or wait for the next scheduled refresh.</div>`;return;}
  const ind=CYC.indicators||{}, comp=CYC.composite;
  let html="";
  if(comp){
    const pct=((comp.score+1)/2*100).toFixed(0);
    const pc = comp.score>0.35?"var(--red)":(comp.score<-0.1?"var(--green)":"var(--amber)");
    html+=`<div class="cycard"><div style="display:flex;justify-content:space-between;align-items:center">`+
      `<span class="cylabel">Composite cycle read</span>`+
      `<span class="cyphase" style="color:${pc}">${comp.phase}</span></div>`+
      `<div class="cybar"><div style="background:#1d9e75"></div><div style="background:#3fb950"></div>`+
      `<div style="background:#d29922"></div><div style="background:#f85149"></div>`+
      `<span class="cymark" style="left:${pct}%"></span></div>`+
      `<div class="cyaxis"><span>Trough</span><span>Early</span><span>Mid</span><span>Late</span><span>Peak</span></div>`+
      `<div class="cysig">`+Object.entries(comp.signals).map(([k,v])=>
        `<span class="chip ${v>0?"hot":(v<0?"cold":"")}">${SIG_LABELS[k]||k} ${v>0?"▲ hot":(v<0?"▼ cold":"— neutral")}</span>`).join("")+
      `</div></div>`;
  }
  html+=`<div class="cygrid">`;
  const s=ind.soxSpx;
  if(s) html+=cyCard("SOX / SPX ratio",
    `${s.value}<small style="color:${trendColor(s.vsAvg1y)}">${s.vsAvg1y>0?"+":""}${s.vsAvg1y}% vs 1y avg</small>`,
    s.series,"#58a6ff","^SOX vs ^GSPC · 10y monthly");
  const p=ind.soxPe;
  if(p) html+=cyCard("SOX multiple (trailing P/E)",
    `${p.value}x<small style="color:${p.premium>20?"var(--red)":(p.premium<-10?"var(--green)":"var(--amber)")}">${p.premium>0?"+":""}${p.premium}% vs ${p.avg10y}x 10y baseline</small>`,
    null,null,`cap-weighted, ${p.names} SOX names · baseline editable in script`);
  const iv=ind.invDays;
  if(iv) html+=cyCard("Inventory days — bellwethers",
    `${iv.value}d<small style="color:${iv.delta>5?"var(--red)":(iv.delta<-5?"var(--green)":"var(--amber)")}">${iv.delta!=null?(iv.delta>0?"+":"")+iv.delta+"d vs yr-ago":""}</small>`,
    iv.series,"#d29922",`${iv.names} USD reporters · quarterly filings`);
  const a=ind.analogYoY;
  if(a) html+=cyCard("Analog revenue YoY",
    `${a.value>0?"+":""}${a.value}%<small style="color:${trendColor(a.value)}">${a.prev!=null?(a.value>a.prev?"accelerating":"decelerating"):""}</small>`,
    a.series,"#3fb950","TXN+ADI+MCHP+NXPI · early-cycle tell");
  const m=ind.memRel3m;
  if(m) html+=cyCard("Memory vs SOX · 3m relative",
    `${m.value>0?"+":""}${m.value}%<small style="color:${trendColor(m.value)}">basket ${m.basket3m>0?"+":""}${m.basket3m}% vs SOX ${m.sox3m>0?"+":""}${m.sox3m}%</small>`,
    null,null,"MU + SK Hynix + Kioxia, local ccy");
  const cx=ind.capexYoY;
  if(cx) html+=cyCard("Hyperscaler capex YoY",
    `${cx.value>0?"+":""}${cx.value}%<small style="color:var(--dim)">$${cx.latestQB}B latest Q</small>`,
    cx.series,"#58a6ff","AMZN MSFT GOOGL META ORCL · cash-flow stmts");
  const f=ind.fredIp;
  if(f) html+=cyCard("US semi production YoY",
    `${f.value>0?"+":""}${f.value}%<small style="color:${f.value>f.prev?"var(--green)":"var(--red)"}">${f.value>f.prev?"accelerating":"decelerating"} · ${f.asOf}</small>`,
    f.series,"#d29922","FRED IPG3344S · monthly");
  const se=ind.sentiment;
  if(se){
    const tone=se.score>0.3?["Bubble talk dominates","var(--red)"]:(se.score<-0.3?["Demand talk dominates","var(--green)"]:["Mixed tone","var(--amber)"]);
    html+=`<div class="cycard" style="grid-column:1/-1"><div class="cylabel">WSJ headline check — last 30 days</div>`+
      `<div class="cyval">${tone[0]}<small style="color:${tone[1]}">${se.bubble} bubble · ${se.demand} demand · ${se.neutral} neutral (${se.total} headlines)</small></div>`+
      (se.headlines||[]).map(h=>`<div class="hl"><span class="tag ${h.tag}">${h.tag}</span>${h.t}</div>`).join("")+
      `<div class="cysrc">Google News RSS, wsj.com only · keyword-scored · crude by design</div></div>`;
  }
  html+=`</div>`;
  const upd=CYC.updated?new Date(CYC.updated).toLocaleString():"";
  html+=`<div class="cysrc" style="margin-top:10px">Cycle data updated ${upd}. Composite = simple average of signal scores (-1 cold … +1 hot); see fetch_cycle_data.py for thresholds.</div>`;
  w.innerHTML=html;
}

// ---- factset render ----
function fsBar(v,color){
  const w=Math.max(1,Math.min(100,v))*1.6;
  return `<span class="fsbar" style="width:${w.toFixed(0)}px;background:${color||"var(--accent)"}"></span>${v.toFixed(1)}%`;
}
function renderFS(){
  const w=document.getElementById("fsWrap");
  if(!FS){w.innerHTML=`<div class="fscard">No factset.json yet — pulled on demand from the FactSet MCP connector (ask Claude to refresh it).</div>`;return;}
  const rows=Object.entries(FS.geo).sort((a,b)=>b[1].cn-a[1].cn);
  let html=`<h2 style="font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 8px">China / Asia revenue exposure — FactSet GeoRev</h2>`;
  html+=`<div class="scrollx"><table style="max-width:880px"><thead><tr><th class="l" style="position:static">Ticker</th>`+
        `<th style="position:static">China</th><th style="position:static">Taiwan</th><th style="position:static">Korea</th>`+
        `<th style="position:static">Japan</th><th style="position:static">US</th><th style="position:static">Fiscal</th></tr></thead><tbody>`;
  rows.forEach(([t,g])=>{
    html+=`<tr><td class="l"><span class="tk">${t}</span><span class="cert" title="FactSet certainty class (A best … E model-estimated)">${g.cert}</span></td>`+
      `<td class="l">${fsBar(g.cn,"#f85149")}</td><td class="l">${fsBar(g.tw,"#d29922")}</td>`+
      `<td class="l">${fsBar(g.kr,"#58a6ff")}</td><td class="l">${fsBar(g.jp,"#8ad1ff")}</td>`+
      `<td class="l">${fsBar(g.us,"#3fb950")}</td><td class="l" style="color:var(--head);font-size:11px">${g.fy}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  html+=`<div class="cysrc" style="margin:8px 0 0;max-width:880px">${FS.note} Geo model assigns revenue to the customer's country — US-heavy prints at TSM/NVDA reflect billing to US-headquartered customers. Certainty ${"E"} rows (ADI, MPWR) are model-estimated.</div>`;
  html+=`<h2 style="font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:24px 0 2px">Supply chain — as disclosed in filings</h2>`;
  html+=`<div class="cysrc" style="margin:0 0 4px">FactSet Supply Chain (DIRECT relationships: counterparties the company itself names). Order per FactSet, not revenue-ranked.</div>`;
  html+=`<div class="fsgrid">`;
  Object.entries(FS.relationships).forEach(([t,r])=>{
    html+=`<div class="fscard"><h3>${t}</h3>`;
    [["Customers",r.customers],["Suppliers",r.suppliers],["Competitors",r.competitors]].forEach(([lab,list])=>{
      if(list&&list.length)
        html+=`<div class="fslabel">${lab}</div><div class="fschips">${list.map(x=>`<span>${x}</span>`).join("")}</div>`;
    });
    html+=`</div>`;
  });
  html+=`</div><div class="cysrc" style="margin-top:10px">Updated ${FS.updated?new Date(FS.updated).toLocaleDateString():""} · ${FS.source}</div>`;
  w.innerHTML=html;
}

// ---- TW monthlies render ----
function twHeatStrip(yoy){
  const last12=(yoy||[]).slice(-12);
  return `<span class="heatstrip">`+last12.map(([k,v])=>
    `<span class="hcell" style="background:${heatColor(v,40)}" title="${k}: ${v==null?"—":(v>0?"+":"")+v+"% YoY"}"></span>`).join("")+`</span>`;
}
function renderTW(){
  const w=document.getElementById("twWrap");
  if(!TW){w.innerHTML=`<div class="fscard">No monthlies.json yet — the GitHub Action builds it on the next run (python fetch_tw_monthlies.py). Taiwan names post monthly revenue by the ~10th.</div>`;return;}
  let html=`<h2 style="font-size:13px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 8px">Taiwan monthly revenue — AI supply chain</h2>`;
  const comp=TW.odmComposite||[];
  if(comp.length){
    const last=comp[comp.length-1];
    html+=`<div class="cycard" style="max-width:720px;margin-bottom:12px"><div class="cylabel">AI server ODM composite — aggregate revenue YoY</div>`+
      `<div class="cyval">${last[1]>0?"+":""}${last[1]}%<small style="color:${trendColor(last[1])}">${last[0]}</small></div>`+
      spark(comp,"#58a6ff")+`<div class="cysrc">Hon Hai + Quanta + Wistron + Wiwynn + Inventec + Compal + Pegatron + Gigabyte + MiTAC + Asus, NT$, common-name months only</div></div>`;
  }
  const groups={};
  Object.entries(TW.names||{}).forEach(([code,x])=>{groups[x.group]=groups[x.group]||[];groups[x.group].push([code,x]);});
  html+=`<div class="scrollx"><table style="max-width:1360px"><thead><tr>`+
    `<th class="l" style="position:static">Company</th><th style="position:static">Month</th>`+
    `<th style="position:static" title="Taiwan monthly revenue is due by the ~10th of the following month">Next rpt</th>`+
    `<th style="position:static">Rev NT$bn</th>`+
    `<th style="position:static">MoM</th><th style="position:static">YoY</th><th style="position:static">3M YoY</th>`+
    `<th style="position:static" title="YoY for the latest calendar quarter. 3/3 months = actual; fewer = missing months filled with that name's typical monthly seasonality; 0 = whole quarter implied from prior quarter x median QoQ seasonality">Impl Q YoY</th>`+
    `<th style="position:static" title="Median QoQ move from Q1 into Q2 across the last 5 years">Q2 seas. QoQ</th>`+
    `<th class="l" style="position:static">Last 12M YoY</th><th class="l" style="position:static">5y revenue</th></tr></thead><tbody>`;
  const order=["Foundry","AI Server ODM","Chassis / Rails","Power / Cooling","Networking / Components"];
  order.forEach(g=>{
    if(!groups[g]) return;
    html+=`<tr class="grouphdr"><td colspan="11">${g}</td></tr>`;
    groups[g].sort((a,b)=>(b[1].latest.yoy??-999)-(a[1].latest.yoy??-999)).forEach(([code,x])=>{
      const L=x.latest, iq=x.impliedQ;
      const iqCell=iq&&iq.yoy!=null?
        `${fmtPct(iq.yoy)} <span class="cert" title="${iq.q}: ${iq.monthsIn}/3 months reported (${iq.method})">${iq.monthsIn}/3${iq.method==="seasonal"?" S":iq.method==="partial"?" E":""}</span>`:
        '<span class="na">—</span>';
      html+=`<tr><td class="l"><span class="tk">${x.n}</span> <span style="color:var(--head);font-size:10px">${code}</span></td>`+
        `<td style="color:var(--dim)">${L.ym}</td>`+
        `<td style="color:var(--head);font-size:11px">${x.nextRelease?x.nextRelease.slice(5).replace("-","/"):"—"}</td>`+
        `<td>${L.revM!=null?(L.revM/1000).toFixed(1):"—"}</td>`+
        `<td>${fmtPct(L.mom)}</td><td>${fmtPct(L.yoy)}</td><td>${fmtPct(L.t3mYoy)}</td>`+
        `<td>${iqCell}</td>`+
        `<td>${x.q2Season!=null?fmtPct(x.q2Season):'<span class="na">—</span>'}</td>`+
        `<td class="l">${twHeatStrip(x.yoy)}</td>`+
        `<td class="l">${spark(x.series,"#8ad1ff")||""}</td></tr>`;
    });
  });
  html+=`</tbody></table></div>`;
  html+=`<div class="cysrc" style="margin-top:10px;max-width:1360px">Company-level TOTAL revenue (Hon Hai includes iPhones, Quanta includes notebooks) — read the ACCELERATION, not the level. Purest AI-server reads: Wiwynn, Chenbro, King Slide, AVC, Auras. `+
    `Impl Q YoY: n/3 = months reported; E = missing months estimated from that name's typical monthly seasonality; S = full quarter implied from prior quarter × median QoQ seasonality (last 5 years). Q2 seas. = median Q1→Q2 QoQ move, last 5 years. Next rpt = ~10th-of-month TWSE deadline. Updated ${TW.updated?new Date(TW.updated).toLocaleDateString():""} · ${TW.source||""}</div>`;
  w.innerHTML=html;
}

// ---- case studies render ----
function csChart(series,color,h){
  if(!series||series.length<2) return "";
  h=h||70;
  let vals=series.map(s=>s[1]).filter(v=>v!=null&&v>0);
  if(!vals.length) return "";
  const useLog=(Math.max(...vals)/Math.min(...vals))>20;
  const tf=useLog?Math.log:(x=>x);
  const tv=series.filter(s=>s[1]!=null&&s[1]>0).map(s=>tf(s[1]));
  const min=Math.min(...tv),max=Math.max(...tv),rng=(max-min)||1;
  const pts=tv.map((v,i)=>`${(i/(tv.length-1)*320).toFixed(1)},${(h-4-(v-min)/rng*(h-10)).toFixed(1)}`).join(" ");
  return `<svg viewBox="0 0 320 ${h}" width="100%" height="${h}" preserveAspectRatio="none">`+
    `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6"/></svg>`+
    (useLog?`<span class="logchip">log scale</span>`:"");
}
function csMcap(x){return x.mcap?`<div class="csmeta">mkt cap ${x.mcap.replace(/->/g,"→")} <span style="opacity:.6">(est.)</span></div>`:"";}
function csSub(x){return (x.sub||[]).map(s=>`<div class="cssubb">${s}</div>`).join("");}
function csNameCard(x,win){
  const cls=win?"pos":"neg", color=win?"var(--green)":"var(--red)";
  if(x.nar)
    return `<div class="cscard nar"><h3>${x.t} — ${x.n}<span class="delchip">delisted / no price history</span></h3>`+
           csMcap(x)+`<div class="csnote">${x.note||""}</div>`+csSub(x)+`</div>`;
  const ret=x.ret!=null?`<span class="r ${x.ret>=0?"pos":"neg"}">${x.ret>0?"+":""}${x.ret.toLocaleString()}%</span>`:"";
  const dd=x.dd&&x.dd.dd<-25?`<span class="csmeta">max DD ${x.dd.dd}% (${x.dd.peakDate} → ${x.dd.troughDate})</span>`:"";
  const span=x.series?`${x.series[0][0].slice(0,4)}–${x.series[x.series.length-1][0].slice(0,4)}`:"";
  return `<div class="cscard"><h3>${x.t} — ${x.n}${ret}</h3><div class="csmeta">${span} ${dd?"· ":""}${dd?x.dd.dd+"% max DD":""}</div>`+
         csMcap(x)+csChart(x.series,color)+`<div class="csnote">${x.note||""}</div>`+csSub(x)+`</div>`;
}
function segBlock(list,label){
  const rows=(list||[]).filter(x=>x.desc||x.seg);
  if(!rows.length) return "";
  return `<div class="cscard" style="margin-top:8px"><div class="fslabel">${label}</div><div class="csb">`+
    rows.map(x=>`<div><b>${x.t}</b> — ${x.desc||""}${x.seg?` · <span style="color:var(--dim)">${x.seg.replace(/->/g,"→")}</span>`:""}</div>`).join("")+
    `</div></div>`;
}
function renderCases(){
  const w=document.getElementById("casesWrap");
  if(!CS){w.innerHTML=`<div class="cscard">No casestudies.json yet — run <b>python fetch_casestudies.py</b> from the repo root (or trigger the GitHub Action; it builds Mondays). Definitions, winners/losers and PM notes live in that script.</div>`;return;}
  let html=`<h2>Major corrections — the index look</h2><div class="sub2">Peak-to-trough on the index that defined each episode. Study the run-up, the break, and what marked the bottom.</div><div class="csgrid">`;
  (CS.corrections||[]).forEach(c=>{
    const dd=c.dd?`<span class="r neg">${c.dd.dd}%</span>`:"";
    html+=`<div class="cscard"><h3>${c.name}${dd}</h3>`+
      `<div class="csmeta">${c.label}${c.dd?` · peak ${c.dd.peakDate} → trough ${c.dd.troughDate}`:""}</div>`+
      csChart(c.series,"#58a6ff",64)+
      `<div class="csb">${(c.bullets||[]).map(b=>`<div>${b}</div>`).join("")}</div></div>`;
  });
  html+=`</div>`;
  (CS.cycles||[]).forEach(cy=>{
    html+=`<h2>${cy.name} <span style="color:var(--head)">· ${cy.period}</span></h2>`;
    if(cy.index&&cy.index.series){
      html+=`<div class="cscard" style="margin-bottom:10px"><h3>${cy.index.label} — the index look`+
        (cy.index.dd?`<span class="r neg">${cy.index.dd.dd}% worst DD</span>`:"")+`</h3>`+
        csChart(cy.index.series,"#58a6ff",64)+`</div>`;
    }
    html+=`<div class="wl win">Winners</div><div class="csgrid">${(cy.winners||[]).map(x=>csNameCard(x,true)).join("")}</div>`;
    html+=segBlock(cy.winners,"Winners — business & growth-segment share of revenue, start → end (est.)");
    html+=`<div class="wl lose">Losers</div><div class="csgrid">${(cy.losers||[]).map(x=>csNameCard(x,false)).join("")}</div>`;
    html+=segBlock(cy.losers,"Losers — business & growth-segment share of revenue, start → end (est.)");
    html+=`<div class="cscard" style="margin-top:10px"><div class="fslabel">PM notes — inflection · peak/sell · short/cover</div>`+
      `<div class="csb">${(cy.bullets||[]).map(b=>`<div>${b}</div>`).join("")}</div></div>`;
  });
  html+=`<div class="cysrc" style="margin-top:12px">Updated ${CS.updated?new Date(CS.updated).toLocaleString():""} · price data Yahoo Finance via fetch_casestudies.py · charts log-scaled where range &gt;20x · delisted names kept as narrative cards. Not investment advice.</div>`;
  w.innerHTML=html;
}

function render(){
  const v=state.view;
  document.getElementById("tableWrap").classList.toggle("hidden",v!=="table");
  document.getElementById("heatWrap").classList.toggle("hidden",v!=="heat");
  document.getElementById("cycleWrap").classList.toggle("hidden",v!=="cycle");
  document.getElementById("fsWrap").classList.toggle("hidden",v!=="fs");
  document.getElementById("twWrap").classList.toggle("hidden",v!=="tw");
  document.getElementById("casesWrap").classList.toggle("hidden",v!=="cases");
  const plain=(v==="cycle"||v==="fs"||v==="cases"||v==="tw");
  document.getElementById("groupby").style.display = plain ? "none" : "";
  document.getElementById("filter").style.display = plain ? "none" : "";
  if(v==="table") renderTable(); else if(v==="heat") renderHeat();
  else if(v==="fs") renderFS(); else if(v==="tw") renderTW(); else if(v==="cases") renderCases(); else renderCycle();
  document.getElementById("foot").innerHTML =
    `Data via Yahoo Finance (yfinance), FRED, Google News RSS and FactSet (GeoRev / Supply Chain via MCP), refreshed daily after US close by GitHub Actions. `+
    `Foreign-listed (FX) names shown in local-currency price/returns. Not investment advice.`;
}

// ---- controls ----
document.getElementById("filter").oninput=e=>{state.filter=e.target.value;render();};
document.getElementById("view").onclick=e=>{const b=e.target.closest("button");if(!b)return;
  state.view=b.dataset.v;[...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));render();};
document.getElementById("groupby").onclick=e=>{const b=e.target.closest("button");if(!b)return;
  state.group=b.dataset.g;[...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x===b));render();};

load();
</script>
